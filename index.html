<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM 8 | Ultimate Growth</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');

        :root {
            --primary: #FF8C00;
            --accent: #FF4500;
            --bg: #050505;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Fluid Animated Background */
        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            filter: blur(120px);
            opacity: 0.3;
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate { 0% { transform: translate(-20%, -20%); } 50% { transform: translate(20%, 20%); } 100% { transform: translate(-20%, -20%); } }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; }

        .btn {
            background: linear-gradient(135deg, #222, #111);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.05);
            border-color: transparent;
        }

        /* Modal Overlay */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #111; padding: 40px; border-radius: 40px; border: 2px solid var(--primary); text-align: center; width: 300px; }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="card">
        <h1>SMM 8</h1>
        <div class="tagline">Premium Growth Lab</div>

        <button class="btn" onclick="openModal('https://smm8.com/free-telegram-members')">
            GET FREE MEMBERS <i data-lucide="users"></i>
        </button>
        <button class="btn" onclick="openModal('https://smm8.com/free-telegram-post-views')">
            GET POST VIEWS <i data-lucide="eye"></i>
        </button>
        <button class="btn" onclick="openModal('https://smmstone.com/free-telegram-reaction')">
            GET TELEGRAM REACTIONS <i data-lucide="users"></i>
        </button>
        <button class="btn" onclick="openModal('https://broker-qx.pro/?lid=544862')">
            GET FREE QUOTEX ACCOUNT <i data-lucide="users"></i>
        </button>
        <button class="btn" onclick="openModal('https://zefoy.com/')">
            TIKTOK FREE VIEWS BY LEO <i data-lucide="users"></i>
        </button>

        <div style="margin-top: 30px; font-size: 0.65rem; color: #444; letter-spacing: 2px;">DEVELOPED BY @UNITEDSCRIPT</div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <i data-lucide="shield-check" size="60" color="#FF8C00"></i>
            <h2 style="margin: 20px 0;">ACCESS GRANTED</h2>
            <p style="color: #888;">Secure redirecting to SMM 8 portal.</p>
            <button id="go" style="width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); border: none; font-weight: 800; cursor: pointer;">PROCEED</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function openModal(url) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('go').onclick = () => window.location.href = url;
        }
        window.onclick = (e) => { if(e.target.id == 'modal') document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
